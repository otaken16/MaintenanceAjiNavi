<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>レビュー登録</title>
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

	<div class="container">

		<h2>レストラン登録画面</h2>

		<form th:action="@{/regist-confirm}" th:object="${registRestaurantForm}" method="post">
			<div class="form-group">
				<label>レストラン名</label>
				<input type="text" th:field="*{restaurantName}">
				<div th:if="${#fields.hasErrors('restaurantName')}" th:errors="*{restaurantName}" class="error-msg">ああ</div>
			</div>
			

			<div class="form-group">
				<label>キャッチフレーズ</label>
				<input type="text" th:field="*{catchPhrase}">
				<div th:if="${#fields.hasErrors('catchPhrase')}" th:errors="*{catchPhrase}" class="error-msg"></div>
			</div>
			<input class="btn" type="submit" value="送信">
		</form>
		<h3>
			<a class="link" href="/mt-top">管理者画面へ</a>
		</h3>

	</div>

</body>

</html>
