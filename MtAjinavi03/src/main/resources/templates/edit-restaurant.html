<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>レストラン編集</title>
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

	<div class="container">

		<h2>レストラン編集画面</h2>

		<form th:action="@{/edit-confirm}" th:object="${editRestaurantForm}" method="post">
			<div class="form-group">
				<label>レストランID</label>
				<p th:text="*{restaurantId}"></p>
				<input type="hidden" th:field="*{restaurantId}">
			</div>

			<div class="form-group">
				<label>レストラン名</label>
				<input type="text" th:field="*{restaurantName}">
				<div th:if="${#fields.hasErrors('restaurantName')}" th:errors="*{restaurantName}" class="error-msg">ああ
				</div>
			</div>

			<div class="form-group">
				<label>キャッチフレーズ</label>
				<input type="text" th:field="*{catchPhrase}">
				<div th:if="${#fields.hasErrors('catchPhrase')}" th:errors="*{catchPhrase}" class="error-msg"></div>
			</div>
			<br>
			<input class="btn" type="submit" value="編集確認へ">
		</form>
		<br>
		<form th:action="@{/search-restaurant-list}" method="post">
			<input type="hidden" name="restaurantName" th:value="${editRestaurantForm.searchRestaurantName}">
			<input class="btn-1" type="submit" value="戻る">
		</form>
		<h3>
			<a class="link" href="/mt-top">管理者画面へ</a>
		</h3>
	</div>

	</div>

</body>

</html>
